services:
  redis:
    image: redis:7.4-alpine
    container_name: moodle_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: mariadb:11.4
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/my.cnf:/etc/mysql/conf.d/99-moodle-tuning.cnf:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: moodle_php
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PHP_FPM_PM: ${PHP_FPM_PM:-dynamic}
      PHP_FPM_MAX_CHILDREN: ${PHP_FPM_MAX_CHILDREN:-24}
      PHP_FPM_START_SERVERS: ${PHP_FPM_START_SERVERS:-4}
      PHP_FPM_MIN_SPARE_SERVERS: ${PHP_FPM_MIN_SPARE_SERVERS:-4}
      PHP_FPM_MAX_SPARE_SERVERS: ${PHP_FPM_MAX_SPARE_SERVERS:-12}
      PHP_FPM_MAX_REQUESTS: ${PHP_FPM_MAX_REQUESTS:-700}
      PHP_FPM_REQUEST_TERMINATE_TIMEOUT: ${PHP_FPM_REQUEST_TERMINATE_TIMEOUT:-300s}
      PHP_FPM_REQUEST_SLOWLOG_TIMEOUT: ${PHP_FPM_REQUEST_SLOWLOG_TIMEOUT:-10s}
    volumes:
      - ./moodle:/var/www/html
      - ./moodledata:/var/www/moodledata
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - $$fp=@fsockopen('127.0.0.1',9000); if (!$$fp) { exit(1); } fclose($$fp); exit(0);
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: moodle_web
    restart: unless-stopped
    ports:
      - "${MOODLE_PORT}:80"
    volumes:
      - ./moodle:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/login/index.php"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      php:
        condition: service_healthy

  k6:
    image: grafana/k6:0.49.0
    container_name: moodle_k6
    profiles: ["loadtest"]
    working_dir: /loadtest
    entrypoint: ["k6"]
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./loadtest:/loadtest
      - ./tmp/loadtest-results:/loadtest/results

volumes:
  db_data:
  redis_data:
